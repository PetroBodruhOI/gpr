name: CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  test-frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: "20" }
      - run: cd frontend && npm ci
      - run: cd frontend && npm run lint
      - run: cd frontend && npm run type-check
      - run: cd frontend && npm test
      - run: cd frontend && npm run build

  lint-hf-space:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.11" }
      - name: Syntax check
        run: |
          python -m py_compile hf_space/app.py
          python -m py_compile hf_space/simple_classify.py
      - name: Install ruff
        run: pip install ruff==0.15.14
      - name: Lint with ruff
        working-directory: hf_space
        run: ruff check .

  test-hf-space:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: 'pip'
          cache-dependency-path: hf_space/requirements-dev.txt

      # System deps that some pip packages need
      - name: Install ffmpeg
        run: sudo apt-get update && sudo apt-get install -y --no-install-recommends ffmpeg

      - name: Install Python deps
        working-directory: hf_space
        run: |
          pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Run pytest
        working-directory: hf_space
        env:
          REDIS_URL: redis://localhost:6379/0
        run: pytest test_app.py -v --tb=short

  deploy-hf-space:
    needs: [test-frontend, lint-hf-space, test-hf-space]
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Push hf_space/ to HuggingFace Space
        run: |
          git config --global user.email "ci@github.com"
          git config --global user.name "GitHub CI"
          cd hf_space
          git init -b main
          git remote add hf https://user:${{ secrets.HF_TOKEN }}@huggingface.co/spaces/${{ secrets.HF_SPACE_ID }}
          git add .
          git commit -m "deploy: ${{ github.sha }}"
          git push hf main --force

  deploy-frontend-vercel:
    needs: [test-frontend, lint-hf-space, test-hf-space]
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    env:
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: "20" }
      - name: Install Vercel CLI
        run: npm install --global vercel@latest
      - name: Install dependencies
        run: npm ci
        working-directory: ./frontend
      - name: Pull Vercel environment
        run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}
        working-directory: ./frontend
      - name: Build frontend for Vercel
        run: vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}
        working-directory: ./frontend
      - name: Deploy frontend to Vercel
        run: vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }}
        working-directory: ./frontend
