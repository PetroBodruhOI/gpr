name: CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main]

jobs:
  test-frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: "20" }
      - run: cd frontend && npm ci
      - run: cd frontend && npm run type-check
      - run: cd frontend && npm run build

  lint-hf-space:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.11" }
      - name: Syntax check
        run: |
          python -m py_compile hf_space/app.py
          python -m py_compile hf_space/simple_classify.py

  deploy-hf-space:
    needs: [test-frontend, lint-hf-space]
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Push hf_space/ to HuggingFace Space
        run: |
          git config --global user.email "ci@github.com"
          git config --global user.name "GitHub CI"
          cd hf_space
          git init -b main
          git remote add hf https://user:${{ secrets.HF_TOKEN }}@huggingface.co/spaces/${{ secrets.HF_SPACE_ID }}
          git add .
          git commit -m "deploy: ${{ github.sha }}"
          git push hf main --force
