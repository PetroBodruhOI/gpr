name: Metrics snapshot

on:
  schedule:
    - cron: '0 * * * *'   # щогодини
  workflow_dispatch:        # запуск вручну з UI

env:
  HF_SPACE_URL: https://petrobodruh-gpr-worker.hf.space
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
  DUMMY_USER: "grafana"
  DUMMY_PASS: "grafana123"

jobs:
  snapshot:
    runs-on: ubuntu-latest
    steps:
      - name: Wake up HF Space (may be sleeping)
        run: |
          echo "Pinging Space to wake it up (cold start can take 60s)…"
          # -L follows redirects, -f returns non-zero on HTTP errors,
          # -m 180 gives the Space time to wake.
          curl -sLfm 180 "$HF_SPACE_URL/" -o /dev/null \
            && echo "✓ Space is awake" \
            || echo "⚠ Wake-up call failed (continuing anyway)"

      - name: Fetch /metrics with retry
        id: fetch
        run: |
          set +e
          for attempt in 1 2 3; do
            echo "Attempt $attempt: fetching metrics…"
            HTTP_CODE=$(curl -sLm 60 -w "%{http_code}" \
              -u "$DUMMY_USER:$DUMMY_PASS" \
              "$HF_SPACE_URL/metrics" -o metrics.txt)
            if [ "$HTTP_CODE" = "200" ] && [ -s metrics.txt ]; then
              echo "✓ Got $(wc -c < metrics.txt) bytes (HTTP $HTTP_CODE)"
              exit 0
            fi
            echo "  HTTP $HTTP_CODE, file size $(wc -c < metrics.txt 2>/dev/null || echo 0)"
            sleep 15
          done
          echo "❌ Failed after 3 attempts" >> $GITHUB_STEP_SUMMARY
          echo '<details><summary>Last response body</summary>' >> $GITHUB_STEP_SUMMARY
          echo '<pre>' >> $GITHUB_STEP_SUMMARY
          head -c 2000 metrics.txt >> $GITHUB_STEP_SUMMARY 2>/dev/null
          echo '</pre></details>' >> $GITHUB_STEP_SUMMARY
          exit 1

      - uses: actions/setup-python@v5
        if: success()
        with:
          python-version: "3.11"

      - name: Build summary (parsed tables)
        if: success()
        run: |
          pip install prometheus-client --quiet
          python <<'PY' >> $GITHUB_STEP_SUMMARY
          from prometheus_client.parser import text_string_to_metric_families
          from collections import defaultdict
          from datetime import datetime, timezone

          with open("metrics.txt") as f:
              families = list(text_string_to_metric_families(f.read()))

          print(f"## 🎸 GPR Stats — {datetime.now(timezone.utc).strftime('%Y-%m-%d %H:%M UTC')}\n")

          # ── Helper: extract _sum and _count for histograms ──
          def hist_agg(family_name, group_by_labels):
              counts, sums = defaultdict(float), defaultdict(float)
              for fam in families:
                  if fam.name != family_name:
                      continue
                  for s in fam.samples:
                      key = tuple(s.labels.get(l, "?") for l in group_by_labels)
                      if s.name.endswith("_count"):
                          counts[key] = s.value
                      elif s.name.endswith("_sum"):
                          sums[key] = s.value
              return counts, sums

          def details(summary, lines):
              print(f"<details><summary>{summary}</summary>\n")
              for l in lines:
                  print(l)
              print("\n</details>\n")

          # ── Predictions ──
          rows = []
          for fam in families:
              if fam.name == "gpr_predictions_total":
                  for s in fam.samples:
                      if s.name == "gpr_predictions_total":
                          rows.append((s.labels.get("predicted_class", "?"),
                                       s.labels.get("source", "?"),
                                       s.labels.get("status", "?"),
                                       int(s.value)))
          if rows:
              total = sum(r[3] for r in rows)
              body = [
                  "| Class | Source | Status | Count |",
                  "|-------|--------|--------|-------|",
              ] + [f"| `{cls}` | {src} | {st} | {cnt} |" for cls, src, st, cnt in sorted(rows)]
              details(f"📊 Predictions — total: **{total}**", body)

          # ── Pipeline stages ──
          counts, sums = hist_agg("gpr_stage_duration_seconds", ["stage"])
          if counts:
              body = [
                  "| Stage | Calls | Total sec | Avg sec |",
                  "|-------|-------|-----------|---------|",
              ]
              for stage in ["download", "demucs", "beat", "classify"]:
                  key = (stage,)
                  if key in counts:
                      cnt = counts[key]
                      avg = sums[key] / cnt if cnt else 0
                      body.append(f"| `{stage}` | {int(cnt)} | {sums[key]:.1f} | {avg:.1f} |")
              details("⚙️ Pipeline performance", body)

          # ── Inference duration (per class) ──
          counts, sums = hist_agg("gpr_inference_duration_seconds",
                                  ["predicted_class", "source"])
          if counts:
              body = [
                  "| Class | Source | Calls | Avg sec |",
                  "|-------|--------|-------|---------|",
              ] + [f"| `{key[0]}` | {key[1]} | {int(counts[key])} | {sums[key]/counts[key]:.1f} |"
                   for key in sorted(counts.keys())]
              details("⏱️ End-to-end inference time", body)

          # ── Audio duration ──
          counts, sums = hist_agg("gpr_audio_duration_seconds", ["source"])
          if counts:
              body = [
                  "| Source | Tracks | Avg seconds |",
                  "|--------|--------|-------------|",
              ] + [f"| {key[0]} | {int(counts[key])} | {sums[key]/counts[key]:.1f} |"
                   for key in sorted(counts.keys())]
              details("🎵 Audio length", body)

          # ── Confidence ──
          counts, sums = hist_agg("gpr_inference_confidence", ["predicted_class"])
          if counts:
              body = [
                  "| Class | Predictions | Avg confidence |",
                  "|-------|-------------|----------------|",
              ] + [f"| `{key[0]}` | {int(counts[key])} | **{sums[key]/counts[key]*100:.1f}%** |"
                   for key in sorted(counts.keys())]
              details("🎯 Average confidence", body)

          # ── User feedback ──
          agg = defaultdict(lambda: {"good": 0, "bad": 0})
          for fam in families:
              if fam.name == "gpr_user_feedback_total":
                  for s in fam.samples:
                      if s.name == "gpr_user_feedback_total":
                          cls = s.labels.get("predicted_class", "?")
                          r = s.labels.get("rating", "?")
                          if r in ("good", "bad"):
                              agg[cls][r] = s.value
          if agg:
              total_g = int(sum(v["good"] for v in agg.values()))
              total_b = int(sum(v["bad"] for v in agg.values()))
              total_all = total_g + total_b
              overall = total_g / total_all * 100 if total_all else 0
              summary = (
                  f"👍/👎 User feedback &nbsp;·&nbsp; "
                  f"всього: **{total_all}** &nbsp;|&nbsp; "
                  f"👍 {total_g} &nbsp;|&nbsp; "
                  f"👎 {total_b} &nbsp;|&nbsp; "
                  f"задоволення: **{overall:.0f}%**"
              )
              body = [
                  "| Class | 👍 Good | 👎 Bad | Score |",
                  "|-------|---------|--------|-------|",
              ]
              for cls in sorted(agg.keys()):
                  g = int(agg[cls]["good"]); b = int(agg[cls]["bad"])
                  score = f"{g/(g+b)*100:.0f}%" if (g+b) else "—"
                  body.append(f"| `{cls}` | {g} | {b} | {score} |")
              details(summary, body)

          import os
          run_id = os.environ.get("GITHUB_RUN_ID", "?")
          print("\n---")
          print(f"_Raw metrics file: see Artifacts → `metrics-{run_id}` (90 days retention)._")
          PY

      - name: Upload raw metrics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: metrics-${{ github.run_id }}
          path: metrics.txt
          retention-days: 90
