# Local development stack — runs the same code that production uses.
# Production: frontend → Vercel, hf_space → HuggingFace Space, Redis → Upstash.
# Locally we replace Vercel/HF/Upstash with Docker containers but the apps themselves are identical.

services:
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  worker:
    build:
      context: ./hf_space
      dockerfile: Dockerfile
    environment:
      REDIS_URL: redis://redis:6379/0
      HF_MODEL_REPO: PetroBodruh/gpr-model
      # HF_TOKEN: <only if model repo is private>
      ALLOWED_ORIGINS: "http://localhost:5173"
    ports:
      - "7860:7860"
    volumes:
      - ./hf_space:/app                       # live code reload
      - torch-cache:/app/.cache/torch         # keep pre-downloaded htdemucs_6s
      - hf-cache:/root/.cache/huggingface     # keep downloaded model.pkl
    depends_on:
      redis:
        condition: service_healthy

  frontend:
    image: node:20-alpine
    working_dir: /app
    volumes:
      - ./frontend:/app
    environment:
      VITE_API_URL: http://localhost:7860
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"
    ports:
      - "5173:5173"

volumes:
  torch-cache:
  hf-cache:
