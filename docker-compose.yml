version: "3.9"

volumes:
  uploads:

services:
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    environment:
      REDIS_URL: redis://redis:6379/0
      UPLOADS_DIR: /uploads
    ports:
      - "8000:8000"
    volumes:
      - uploads:/uploads
    depends_on:
      redis:
        condition: service_healthy

  worker:
    build:
      context: ./ml_worker
      dockerfile: Dockerfile
    environment:
      REDIS_URL: redis://redis:6379/0
      MODEL_PATH: /app/model.pkl
      UPLOADS_DIR: /uploads
    volumes:
      - ./ml_worker:/app
      - uploads:/uploads
    depends_on:
      redis:
        condition: service_healthy

  frontend:
    image: node:20-alpine
    working_dir: /app
    volumes:
      - ./frontend:/app
    environment:
      VITE_API_URL: http://localhost:8000
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"
    ports:
      - "5173:5173"
